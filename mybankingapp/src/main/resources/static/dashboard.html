<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>User Dashboard | MyBankingApp</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins', sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        min-height:100vh;
    }

    .navbar{
        width:100%;
        padding:20px 80px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(10px);
    }

    .logo{
        font-size:28px;
        font-weight:700;
        color:#38bdf8;
    }

    .nav-links{
        display:flex;
        align-items:center;
        gap:20px;
    }

    .nav-links a{
        text-decoration:none;
        color:white;
        transition:0.3s;
        font-weight:500;
    }

    .home-btn{
        background:#38bdf8;
        color:black !important;
        padding:10px 18px;
        border-radius:8px;
        font-weight:600;
    }

    .logout-btn{
        background:#ef4444;
        padding:10px 18px;
        border-radius:8px;
        color:white !important;
        font-weight:600;
    }

    .main-container{
        padding:40px 80px;
    }

    .welcome-section{
        margin-bottom:40px;
    }

    .welcome-section h1{
        font-size:42px;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .welcome-section p{
        color:#cbd5e1;
        font-size:18px;
    }

    .account-info{
        background:rgba(255,255,255,0.08);
        padding:25px;
        border-radius:20px;
        margin-bottom:30px;
        color:white;
        box-shadow:0 8px 30px rgba(0,0,0,0.3);
    }

    .account-info h2{
        color:#38bdf8;
        margin-bottom:15px;
    }

    .account-info p{
        margin:10px 0;
        font-size:18px;
    }

    .dashboard{
        display:grid;
        grid-template-columns:
        repeat(auto-fit,minmax(320px,1fr));
        gap:25px;
    }

    .card{
        background:rgba(255,255,255,0.08);
        padding:30px;
        border-radius:20px;
        backdrop-filter:blur(10px);
        box-shadow:0 8px 30px rgba(0,0,0,0.4);
    }

    .card h2{
        margin-bottom:20px;
        color:#38bdf8;
    }

    .card input{
        width:100%;
        padding:14px;
        margin-bottom:15px;
        border:none;
        outline:none;
        border-radius:10px;
        background:rgba(255,255,255,0.12);
        color:white;
        font-size:15px;
    }

    .card input::placeholder{
        color:#cbd5e1;
    }

    .card button{
        width:100%;
        padding:14px;
        border:none;
        border-radius:10px;
        background:#38bdf8;
        color:black;
        font-weight:600;
        cursor:pointer;
        transition:0.3s;
    }

    .card button:hover{
        transform:translateY(-3px);
    }

    #balanceResult{
        margin-top:15px;
        font-size:20px;
        color:#22c55e;
    }

    #message{
        text-align:center;
        margin-top:30px;
        padding:15px;
        border-radius:10px;
        background:rgba(34,197,94,0.15);
        color:#22c55e;
        font-size:18px;
        font-weight:500;
        display:none;
    }

    #transactionTable{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    #transactionTable th,
    #transactionTable td{

        padding:12px;
        border:1px solid rgba(255,255,255,0.2);
        text-align:center;
    }

    #transactionTable th{
        background:#38bdf8;
        color:black;
    }

    @media(max-width:768px){

        .navbar{
            padding:20px 30px;
        }

        .main-container{
            padding:30px;
        }

        .welcome-section h1{
            font-size:32px;
        }
    }

</style>

<nav class="navbar">

    <div class="logo">
        MyBankingApp
    </div>

    <div class="nav-links">

        <a href="index.html"
        class="home-btn">
            Home
        </a>

        <a href="#"
        class="logout-btn"
        onclick="logout()">
            Logout
        </a>

    </div>

</nav>



<div class="main-container">

    <div class="welcome-section">

        <h1>
            Banking Dashboard
        </h1>

        <p>
            Manage your banking activities securely.
        </p>

    </div>



    <!-- ACCOUNT INFO -->

    <div class="account-info">

        <h2>Your Account Details</h2>

        <p>

            <strong>Account Number:</strong>

            <span id="displayAccountNumber"></span>

        </p>

        <p>

            <strong>Available Balance:</strong>

            ₹ <span id="displayBalance"></span>

        </p>

    </div>



    <div class="dashboard">


        <!-- RAZORPAY PAYMENT -->

        <div class="card">

            <h2>Add Money</h2>

            <input type="number"
            id="depositAmount"
            placeholder="Enter Amount">

            <button onclick="payNow()">

                Pay & Deposit

            </button>

        </div>



        <!-- WITHDRAW -->

        <div class="card">

            <h2>Withdraw Money</h2>

            <input type="number"
            id="withdrawAmount"
            placeholder="Enter Amount">

            <button onclick="withdrawMoney()">

                Withdraw

            </button>

        </div>



        <!-- CHECK BALANCE -->

        <div class="card">

            <h2>Check Balance</h2>

            <button onclick="checkBalance()">

                Check Balance

            </button>

            <div id="balanceResult"></div>

        </div>



        <!-- TRANSACTION HISTORY -->

        <div class="card">

            <h2>Transaction History</h2>

            <button onclick="loadTransactions()">

                View Transactions

            </button>

            <div style="
            overflow-x:auto;
            margin-top:20px;">

                <table id="transactionTable">

                </table>

            </div>

        </div>

    </div>

    <div id="message"></div>

</div>



<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

    let loggedInAccountNumber = "";



    async function loadUserAccount(){

        const email =
        localStorage.getItem(
        "loggedInEmail");

        const response =
        await fetch(
        `http://localhost:8080/account/user/${email}`);

        const account =
        await response.json();

        loggedInAccountNumber =
        account.accountNumber;

        document.getElementById(
        "displayAccountNumber")
        .innerText =
        account.accountNumber;

        document.getElementById(
        "displayBalance")
        .innerText =
        account.balance;
    }

    loadUserAccount();



    function showMessage(text){

        const message =
        document.getElementById("message");

        message.style.display = "block";

        message.innerText = text;

        setTimeout(() => {

            message.style.display = "none";

        },10000);
    }



    // RAZORPAY PAYMENT

    async function payNow(){

        const amount =
        document.getElementById(
        "depositAmount").value;

        if(amount <= 0){

            showMessage(
            "Enter valid amount");

            return;
        }

        try{

            const response =
            await fetch(

            `http://localhost:8080/payment/create-order?amount=${amount}`,

            {
                method:"POST"
            });

            const order =
            await response.json();

            console.log(order);



            const options = {

                key:
                "rzp_test_So0gKn4F6TG0LF",

                amount:
                order.amount,

                currency:
                order.currency,

                name:
                "MyBankingApp",

                description:
                "Bank Deposit",

                image:
                "https://cdn-icons-png.flaticon.com/512/2830/2830284.png",

                order_id:
                order.id,

                handler:
                async function(response){

                    console.log(response);

                    alert(
                    "Payment Successful\nPayment ID : "
                    + response.razorpay_payment_id);



                    // UPDATE BALANCE

                    const depositResponse =
                    await fetch(

                    `http://localhost:8080/account/deposit?accountNumber=${loggedInAccountNumber}&amount=${amount}`,

                    {
                        method:"POST"
                    });

                    const result =
                    await depositResponse.text();

                    showMessage(result);

                    loadUserAccount();
                },

                prefill:{

                    name:"Test User",

                    email:
                    localStorage.getItem(
                    "loggedInEmail"),

                    contact:"9876543210"
                },

                notes:{

                    accountNumber:
                    loggedInAccountNumber
                },

                theme:{

                    color:"#38bdf8"
                },

                modal:{

                    ondismiss:function(){

                        showMessage(
                        "Payment Cancelled");
                    }
                }
            };

            const razorpay =
            new Razorpay(options);

            razorpay.open();

        }catch(error){

            console.log(error);

            showMessage(
            "Payment Failed");
        }
    }



    // WITHDRAW MONEY

    async function withdrawMoney(){

        const amount =
        document.getElementById(
        "withdrawAmount").value;

        if(amount <= 0){

            showMessage(
            "Enter valid amount");

            return;
        }

        const response =
        await fetch(

        `http://localhost:8080/account/withdraw?accountNumber=${loggedInAccountNumber}&amount=${amount}`,

        {
            method:"POST"
        });

        const result =
        await response.text();

        showMessage(result);

        loadUserAccount();
    }



    // CHECK BALANCE

    async function checkBalance(){

        const response =
        await fetch(

        `http://localhost:8080/account/balance/${loggedInAccountNumber}`);

        const result =
        await response.text();

        document.getElementById(
        "balanceResult")
        .innerText =
        "Current Balance : ₹ " + result;
    }



    // TRANSACTION HISTORY

    async function loadTransactions(){

        const response =
        await fetch(

        `http://localhost:8080/account/transactions/${loggedInAccountNumber}`);

        const transactions =
        await response.json();

        let tableData = `

            <tr>

                <th>Type</th>

                <th>Amount</th>

                <th>Time</th>

            </tr>
        `;

        transactions.forEach(transaction => {

            tableData += `

                <tr>

                    <td>
                    ${transaction.transactionType}
                    </td>

                    <td>
                    ₹ ${transaction.amount}
                    </td>

                    <td>
                    ${transaction.transactionTime}
                    </td>

                </tr>
            `;
        });

        document.getElementById(
        "transactionTable")
        .innerHTML = tableData;
    }



    function logout(){

        localStorage.removeItem(
        "loggedInEmail");

        window.location.href =
        "login.html";
    }

</script>
