<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | MyBankingApp</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins', sans-serif;
    }

    body{
        min-height:100vh;
        background:#0f172a;
        color:white;
    }

    .navbar{
        width:100%;
        padding:20px 80px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(10px);
    }

    .logo{
        font-size:28px;
        font-weight:700;
        color:#38bdf8;
    }

    .nav-links{
        display:flex;
        gap:20px;
        align-items:center;
    }

    .nav-links a{
        text-decoration:none;
        color:white;
        transition:0.3s;
        font-weight:500;
    }

    .nav-links a:hover{
        color:#38bdf8;
    }

    .home-btn{
        background:#38bdf8;
        color:black !important;
        padding:10px 18px;
        border-radius:8px;
        font-weight:600;
    }

    .main-container{
        height:calc(100vh - 90px);
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .container{
        width:420px;
        background:rgba(255,255,255,0.08);
        padding:40px;
        border-radius:20px;
        backdrop-filter:blur(10px);
        box-shadow:0 8px 30px rgba(0,0,0,0.4);
        color:white;
    }

    .container h1{
        text-align:center;
        margin-bottom:10px;
        color:#38bdf8;
    }

    .container p{
        text-align:center;
        color:#cbd5e1;
        margin-bottom:30px;
    }

    .input-group{
        margin-bottom:20px;
    }

    .input-group label{
        display:block;
        margin-bottom:8px;
        font-size:14px;
    }

    .input-group input,
    .input-group select{

        width:100%;
        padding:14px;
        border:none;
        outline:none;
        border-radius:10px;
        background:rgba(255,255,255,0.12);
        color:white;
        font-size:15px;
    }

    .input-group select option{
        color:black;
    }

    .input-group input::placeholder{
        color:#cbd5e1;
    }

    .login-btn{
        width:100%;
        padding:14px;
        border:none;
        border-radius:10px;
        background:#38bdf8;
        color:black;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
        transition:0.3s;
    }

    .login-btn:hover{
        transform:translateY(-3px);
    }

    .bottom-text{
        text-align:center;
        margin-top:20px;
        color:#cbd5e1;
    }

    .bottom-text a{
        color:#38bdf8;
        text-decoration:none;
        font-weight:600;
    }

    #message{
        text-align:center;
        margin-top:15px;
        color:#22c55e;
        font-size:18px;
    }

    @media(max-width:768px){

        .navbar{
            padding:20px 30px;
        }

        .container{
            width:100%;
        }
    }

</style>

<nav class="navbar">

    <div class="logo">
        MyBankingApp
    </div>

    <div class="nav-links">

        <a href="index.html"
        class="home-btn">
            Home
        </a>

        <a href="register.html">
            Register
        </a>

    </div>

</nav>


<div class="main-container">

    <div class="container">

        <h1>Login</h1>

        <p>
            Access your banking dashboard securely
        </p>

        <form id="loginForm">

            <div class="input-group">

                <label>Email</label>

                <input type="email"
                id="email"
                placeholder="Enter your email"
                required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input type="password"
                id="password"
                placeholder="Enter your password"
                required>

            </div>

            <div class="input-group">

                <label>Select Role</label>

                <select id="role">

                    <option value="USER">
                        USER
                    </option>

                    <option value="ADMIN">
                        ADMIN
                    </option>

                </select>

            </div>

            <button type="submit"
            class="login-btn">

                Login

            </button>

        </form>

        <p id="message"></p>

        <div class="bottom-text">

            Don't have an account?

            <a href="register.html">
                Register
            </a>

        </div>

    </div>

</div>


<script>

    const form =
    document.getElementById("loginForm");

    form.addEventListener("submit",
    async function(event){

        event.preventDefault();

        const email =
        document.getElementById("email").value;

        const password =
        document.getElementById("password").value;

        const userData = {

            email: email,

            password: password
        };

        const selectedRole =
        document.getElementById("role").value;

        try{

            const response =
            await fetch(
            "http://localhost:8080/auth/login",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body: JSON.stringify(userData)
            });

            const result =
            await response.text();

            if(result.toLowerCase()
            .includes("login")){

                // STORE LOGGED-IN EMAIL

                localStorage.setItem(
                    "loggedInEmail",
                    email
                );

                document.getElementById("message")
                .innerText =
                "Login Successful";

                if(selectedRole === "USER"){

                    setTimeout(() => {

                        window.location.href =
                        "dashboard.html";

                    },1000);

                }else{

                    setTimeout(() => {

                        window.location.href =
                        "admin.html";

                    },1000);
                }

            }else{

                document.getElementById("message")
                .innerText =
                result;
            }

        }catch(error){

            document.getElementById("message")
            .innerText =
            "Server Error";
        }

    });

</script>
